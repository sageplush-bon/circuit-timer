<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Chest and Arm Circuit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#141210;
    --surface:#1e1a15;
    --surface-2:#272119;
    --line:#3a3228;
    --text:#f3ede2;
    --muted:#9a8f7d;
    --muted-2:#6f665a;
    /* phase colors */
    --ember-1:#ff7a1a;
    --ember-2:#ffc245;
    --cool-1:#4aa8d8;
    --cool-2:#7fd4e6;
    --go:#79d17a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
    touch-action:manipulation;
  }
  #app{
    height:100dvh;
    width:100%;
    display:flex;
    flex-direction:column;
    max-width:520px;
    margin:0 auto;
    padding:env(safe-area-inset-top) 20px env(safe-area-inset-bottom);
    position:relative;
  }
  .eyebrow{
    font-family:'Barlow Condensed',sans-serif;
    text-transform:uppercase;
    letter-spacing:.22em;
    font-weight:600;
    color:var(--muted);
    font-size:13px;
  }
  .hidden{display:none !important}

  /* ---------- START SCREEN ---------- */
  #start{
    height:100%;
    display:flex;
    flex-direction:column;
    padding-top:28px;
  }
  .start-head{margin-bottom:8px}
  .start-head h1{
    font-family:'Barlow Condensed',sans-serif;
    font-weight:700;
    font-size:44px;
    line-height:.98;
    text-transform:uppercase;
    letter-spacing:.01em;
    margin:10px 0 6px;
  }
  .start-meta{
    color:var(--muted);
    font-size:14px;
    display:flex;
    gap:16px;
    align-items:center;
    margin-bottom:18px;
  }
  .start-meta strong{color:var(--ember-2);font-weight:600}
  .list{
    flex:1;
    overflow-y:auto;
    border-top:1px solid var(--line);
    -webkit-overflow-scrolling:touch;
    mask-image:linear-gradient(to bottom,transparent 0,#000 14px,#000 calc(100% - 14px),transparent 100%);
  }
  .row{
    display:flex;
    align-items:center;
    gap:14px;
    padding:12px 2px;
    border-bottom:1px solid var(--line);
  }
  .row .idx{
    font-family:'Barlow Condensed',sans-serif;
    font-weight:600;
    font-size:15px;
    color:var(--muted-2);
    width:22px;
    text-align:right;
    flex:none;
  }
  .row .rname{flex:1;font-weight:500;font-size:16px}
  .row .rmuscle{font-size:12px;color:var(--muted);margin-top:1px}
  .row .rload{
    font-family:'Barlow Condensed',sans-serif;
    font-weight:600;
    font-size:14px;
    letter-spacing:.03em;
    color:var(--ember-2);
    background:var(--surface-2);
    border:1px solid var(--line);
    padding:4px 9px;
    border-radius:999px;
    flex:none;
  }
  .primary{
    font-family:'Barlow Condensed',sans-serif;
    text-transform:uppercase;
    letter-spacing:.14em;
    font-weight:700;
    font-size:20px;
    color:#1a1410;
    background:linear-gradient(180deg,var(--ember-2),var(--ember-1));
    border:none;
    border-radius:16px;
    padding:18px;
    width:100%;
    cursor:pointer;
    margin-top:16px;
    box-shadow:0 8px 30px -8px rgba(255,122,26,.5);
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .primary:active{transform:translateY(2px);box-shadow:0 4px 16px -8px rgba(255,122,26,.5)}
  .fineprint{text-align:center;color:var(--muted-2);font-size:12px;margin-top:12px}

  /* ---------- SESSION SCREEN ---------- */
  #session{height:100%;flex-direction:column;display:flex}
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:20px 2px 6px;
  }
  .counter{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:16px;letter-spacing:.06em;color:var(--muted)}
  .counter b{color:var(--text)}
  .quit{
    background:none;border:1px solid var(--line);color:var(--muted);
    font-size:12px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;
    padding:7px 12px;border-radius:999px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;
  }
  .quit:active{background:var(--surface)}

  .ring-wrap{
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:6px auto 2px;
    width:min(78vw,300px);
    height:min(78vw,300px);
    flex:none;
  }
  svg.ring{width:100%;height:100%;transform:rotate(-90deg)}
  .ring-track{fill:none;stroke:var(--surface-2);stroke-width:14}
  .ring-prog{fill:none;stroke-width:14;stroke-linecap:round;transition:stroke .4s ease}
  .ring-center{
    position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;
  }
  .phase-label{
    font-family:'Barlow Condensed',sans-serif;
    text-transform:uppercase;letter-spacing:.24em;font-weight:600;font-size:16px;
    margin-bottom:2px;transition:color .4s ease;
  }
  .time{
    font-family:'Barlow Condensed',sans-serif;
    font-weight:700;font-size:96px;line-height:.9;font-variant-numeric:tabular-nums;
    letter-spacing:.01em;
  }
  .time-unit{font-size:15px;color:var(--muted);letter-spacing:.2em;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;margin-top:2px}

  .detail{
    flex:1;
    overflow-y:auto;
    margin-top:8px;
    -webkit-overflow-scrolling:touch;
  }
  .ex-name{
    font-family:'Barlow Condensed',sans-serif;
    font-weight:700;font-size:30px;line-height:1;text-transform:uppercase;
    text-align:center;margin-bottom:4px;
  }
  .ex-sub{text-align:center;color:var(--muted);font-size:13px;margin-bottom:14px}
  .ex-sub .dot{color:var(--muted-2);margin:0 7px}
  .cues{list-style:none;display:flex;flex-direction:column;gap:9px;padding:0 2px 4px}
  .cues li{
    display:flex;gap:11px;font-size:15px;line-height:1.4;color:#e2dacd;
  }
  .cues li::before{
    content:"";flex:none;width:7px;height:7px;border-radius:50%;
    background:var(--ember-1);margin-top:7px;
  }
  .tempo{
    display:inline-flex;align-items:center;gap:8px;margin-top:14px;
    font-size:13px;color:var(--ember-2);background:var(--surface);
    border:1px solid var(--line);padding:8px 14px;border-radius:999px;font-weight:500;
  }
  .tempo .tlabel{color:var(--muted);font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.14em;font-size:11px}

  .rest-view{text-align:center;padding-top:6px}
  .nextcard{
    background:var(--surface);border:1px solid var(--line);border-radius:16px;
    padding:16px;margin:2px 2px 0;text-align:left;
  }
  .nextcard .nlabel{
    font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;
    letter-spacing:.2em;font-size:11px;color:var(--cool-2);font-weight:600;margin-bottom:8px;
  }
  .nextcard .nname{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:24px;text-transform:uppercase;line-height:1}
  .nextcard .nsub{color:var(--muted);font-size:13px;margin-top:4px}
  .nextcard .ncue{color:#d8d0c2;font-size:14px;margin-top:12px;line-height:1.45;border-top:1px solid var(--line);padding-top:12px}

  /* ---------- CONTROLS ---------- */
  .controls{
    display:flex;gap:12px;padding:10px 0 6px;flex:none;
  }
  .ctrl{
    flex:1;display:flex;align-items:center;justify-content:center;gap:8px;
    background:var(--surface);border:1px solid var(--line);color:var(--text);
    font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.1em;
    font-weight:600;font-size:16px;padding:15px;border-radius:14px;cursor:pointer;
    transition:background .12s ease;
  }
  .ctrl:active{background:var(--surface-2)}
  .ctrl svg{width:18px;height:18px;fill:currentColor}
  .ctrl.pause{flex:1.4;background:var(--surface-2)}
  .ctrl.paused-state{background:linear-gradient(180deg,var(--go),#5cb85c);color:#12210f;border-color:transparent}

  /* ---------- DONE SCREEN ---------- */
  #done{height:100%;flex-direction:column;align-items:center;justify-content:center;text-align:center;display:flex;gap:8px;padding-bottom:8vh}
  #done .check{
    width:92px;height:92px;border-radius:50%;
    background:linear-gradient(180deg,var(--ember-2),var(--ember-1));
    display:flex;align-items:center;justify-content:center;margin-bottom:10px;
    box-shadow:0 10px 40px -10px rgba(255,122,26,.6);
  }
  #done .check svg{width:44px;height:44px;fill:#1a1410}
  #done h2{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:42px;text-transform:uppercase;line-height:1}
  #done p{color:var(--muted);font-size:15px;max-width:280px;line-height:1.5}
  #done .stats{display:flex;gap:26px;margin:14px 0 22px}
  #done .stat{display:flex;flex-direction:column}
  #done .stat b{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:700;color:var(--ember-2)}
  #done .stat span{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em}

  @media (prefers-reduced-motion: reduce){
    *{animation:none !important;transition:none !important}
  }
  @media (max-height:700px){
    .time{font-size:78px}
    .start-head h1{font-size:36px}
  }
</style>
</head>
<body>
<div id="app">

  <!-- START -->
  <section id="start">
    <div class="start-head">
      <div class="eyebrow">10 minute session</div>
      <h1>Chest &amp; Arm<br>Circuit</h1>
      <div class="start-meta">
        <span><strong>10</strong> moves</span>
        <span><strong>45s</strong> work</span>
        <span><strong>15s</strong> rest</span>
      </div>
    </div>
    <div class="list" id="startList"></div>
    <button class="primary" id="startBtn">Start Session</button>
    <div class="fineprint">Prop your phone up. Sound on for cues. Screen stays awake.</div>
  </section>

  <!-- SESSION -->
  <section id="session" class="hidden">
    <div class="topbar">
      <div class="counter"><b id="cCur">01</b> / <span id="cTot">10</span></div>
      <button class="quit" id="quitBtn">End</button>
    </div>

    <div class="ring-wrap">
      <svg class="ring" viewBox="0 0 300 300">
        <circle class="ring-track" cx="150" cy="150" r="130"></circle>
        <circle class="ring-prog" id="ringProg" cx="150" cy="150" r="130"></circle>
      </svg>
      <div class="ring-center">
        <div class="phase-label" id="phaseLabel">Get Ready</div>
        <div class="time" id="timeNum">10</div>
        <div class="time-unit">seconds</div>
      </div>
    </div>

    <div class="detail" id="detail"><!-- work or rest view injected here --></div>

    <div class="controls">
      <button class="ctrl" id="prevBtn" title="Restart current move">
        <svg viewBox="0 0 24 24"><path d="M11 18V6l-8.5 6 8.5 6zm.5-6l8.5 6V6l-8.5 6z"/></svg>
        Back
      </button>
      <button class="ctrl pause" id="pauseBtn">
        <svg id="pauseIcon" viewBox="0 0 24 24"><path d="M6 5h4v14H6zm8 0h4v14h-4z"/></svg>
        <span id="pauseText">Pause</span>
      </button>
      <button class="ctrl" id="skipBtn" title="Skip ahead">
        Skip
        <svg viewBox="0 0 24 24"><path d="M13 6v12l8.5-6L13 6zM4 6v12l8.5-6L4 6z"/></svg>
      </button>
    </div>
  </section>

  <!-- DONE -->
  <section id="done" class="hidden">
    <div class="check"><svg viewBox="0 0 24 24"><path d="M9 16.2 4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4z"/></svg></div>
    <h2>Session Complete</h2>
    <div class="stats">
      <div class="stat"><b>10</b><span>Moves</span></div>
      <div class="stat"><b id="doneTime">10:00</b><span>Elapsed</span></div>
      <div class="stat"><b>360</b><span>Work sec</span></div>
    </div>
    <p>Nice work. Stretch the chest and shoulders while you cool down, then hydrate.</p>
    <button class="primary" id="againBtn" style="max-width:300px">Run It Again</button>
  </section>

</div>

<script>
(function(){
  "use strict";

  // ---------- DATA ----------
  var EX = [
    { name:"Floor Press", load:"25 lb", muscle:"Chest, Triceps",
      cues:[
        "Lie on your back, knees bent, a dumbbell in each hand at chest width.",
        "Press both weights straight up until arms are nearly locked, wrists stacked over elbows.",
        "Lower under control until your upper arms rest lightly on the floor, then drive up.",
        "Keep your ribs down and lower back flat."
      ], tempo:"3 seconds down, 1 second up" },
    { name:"Alternating Bicep Curl", load:"15 lb", muscle:"Biceps",
      cues:[
        "Stand tall, dumbbells at your sides, palms facing forward.",
        "Curl one weight up while keeping that elbow pinned to your ribs.",
        "Squeeze hard at the top, then lower slowly before switching arms.",
        "No swinging or leaning back to cheat the weight up."
      ], tempo:"Slow lower, one arm at a time" },
    { name:"Floor Fly", load:"15 lb", muscle:"Chest",
      cues:[
        "Lie on your back, weights pressed above your chest, palms facing each other.",
        "With a soft bend in the elbows, open your arms wide in a slow arc.",
        "Lower until your arms lightly touch the floor and you feel the chest stretch.",
        "Squeeze the chest to bring the weights back together over your centerline."
      ], tempo:"Wide and slow, feel the stretch" },
    { name:"Overhead Tricep Extension", load:"25 lb", muscle:"Triceps",
      cues:[
        "Stand tall, hold one dumbbell overhead with both hands cupping the top end.",
        "Keep your elbows close to your head and pointing forward.",
        "Lower the weight behind your head by bending only at the elbows.",
        "Extend back to full lockout and squeeze the triceps."
      ], tempo:"3 seconds down, controlled up" },
    { name:"Close Grip Floor Press", load:"25 lb", muscle:"Triceps, Inner Chest",
      cues:[
        "Lie on your back, dumbbells pressed together above your chest, palms facing.",
        "Keep your elbows tucked close to your sides as you lower.",
        "Touch your upper arms to the floor, then press up keeping the weights together.",
        "The tucked elbows shift the work onto your triceps."
      ], tempo:"2 seconds down, drive up" },
    { name:"Hammer Curl", load:"15 lb", muscle:"Biceps, Forearms",
      cues:[
        "Stand tall, palms facing each other, thumbs pointing up.",
        "Curl both weights up together, holding the neutral grip.",
        "Squeeze at the top with elbows pinned to your sides.",
        "Lower slowly all the way to full extension."
      ], tempo:"Steady rhythm, no swing" },
    { name:"Squeeze Press", load:"15 lb x2", muscle:"Inner Chest",
      cues:[
        "Lie on your back, press two dumbbells together above your chest, palms facing.",
        "Push the weights hard into each other the entire set.",
        "Press up and lower slowly while keeping constant inward pressure.",
        "The squeeze is what lights up the inner chest."
      ], tempo:"Constant tension, slow reps" },
    { name:"Tricep Kickback", load:"15 lb", muscle:"Triceps",
      cues:[
        "Hinge forward at the hips with a flat back, a weight in each hand.",
        "Pin your upper arms against your sides, elbows bent at ninety degrees.",
        "Extend the weights straight back until your arms fully lock out.",
        "Squeeze at the top, then return under control."
      ], tempo:"Pause and squeeze at lockout" },
    { name:"Cross Body Curl", load:"15 lb", muscle:"Biceps Peak",
      cues:[
        "Stand tall, palms facing in, thumbs up.",
        "Curl one weight across your body toward the opposite shoulder.",
        "Keep your elbow down as you lift, squeeze, then lower slowly.",
        "Alternate arms with each rep."
      ], tempo:"Controlled, peak squeeze" },
    { name:"Push Up Finisher", load:"Bodyweight", muscle:"Chest Burnout",
      cues:[
        "Hands slightly wider than your shoulders, body in one straight line.",
        "Lower your chest toward the floor with elbows at about forty five degrees.",
        "Press all the way back up, keeping your core tight.",
        "Drop to your knees if needed so you keep moving the whole time."
      ], tempo:"Steady reps, chase the pump" }
  ];

  var PREP = 10, WORK = 45, REST = 15;

  // Build flat segment list
  var SEG = [];
  SEG.push({ kind:"prep", dur:PREP, i:0 });
  for(var k=0;k<EX.length;k++){
    SEG.push({ kind:"work", dur:WORK, i:k });
    if(k < EX.length-1) SEG.push({ kind:"rest", dur:REST, i:k, next:k+1 });
  }

  // ---------- DOM ----------
  var $ = function(id){ return document.getElementById(id); };
  var startScreen=$("start"), sessionScreen=$("session"), doneScreen=$("done");
  var ringProg=$("ringProg"), phaseLabel=$("phaseLabel"), timeNum=$("timeNum");
  var detail=$("detail"), cCur=$("cCur"), cTot=$("cTot");
  var pauseBtn=$("pauseBtn"), pauseIcon=$("pauseIcon"), pauseText=$("pauseText");

  var C = 2 * Math.PI * 130; // circumference
  ringProg.style.strokeDasharray = C + " " + C;

  // ---------- BUILD START LIST ----------
  (function(){
    var html="";
    for(var n=0;n<EX.length;n++){
      var e=EX[n];
      html += '<div class="row">'
        + '<div class="idx">'+String(n+1).padStart(2,"0")+'</div>'
        + '<div class="rname">'+e.name+'<div class="rmuscle">'+e.muscle+'</div></div>'
        + '<div class="rload">'+e.load+'</div>'
        + '</div>';
    }
    $("startList").innerHTML = html;
    cTot.textContent = EX.length;
  })();

  // ---------- AUDIO ----------
  var actx=null;
  function initAudio(){
    if(actx) return;
    try{ actx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ actx=null; }
  }
  function tone(freq, dur, when, vol, type){
    if(!actx) return;
    when = when || 0; vol = vol==null?0.22:vol; type=type||"sine";
    var t0 = actx.currentTime + when;
    var osc = actx.createOscillator();
    var g = actx.createGain();
    osc.type=type; osc.frequency.value=freq;
    osc.connect(g); g.connect(actx.destination);
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(vol, t0+0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
    osc.start(t0); osc.stop(t0+dur+0.02);
  }
  function cueWork(){ tone(660,0.12,0,0.22,"square"); tone(990,0.16,0.14,0.22,"square"); }
  function cueRest(){ tone(392,0.28,0,0.2,"sine"); }
  function cuePrep(){ tone(523,0.2,0,0.18,"sine"); }
  function cueTick(){ tone(760,0.07,0,0.18,"triangle"); }
  function cueDone(){ tone(523,0.16,0,0.22); tone(659,0.16,0.16,0.22); tone(784,0.34,0.32,0.24); }

  // ---------- STATE ----------
  var idx=0;          // current segment index
  var remaining=0;    // seconds remaining (float)
  var running=false;
  var paused=false;
  var lastTs=0;
  var lastWholeSec=-1;
  var rafId=null;
  var wakeLock=null;

  async function requestWake(){
    try{
      if("wakeLock" in navigator){ wakeLock = await navigator.wakeLock.request("screen"); }
    }catch(e){}
  }
  function releaseWake(){ try{ if(wakeLock){ wakeLock.release(); wakeLock=null; } }catch(e){} }
  document.addEventListener("visibilitychange", function(){
    if(document.visibilityState==="visible" && running && !paused) requestWake();
  });

  function phaseColors(kind){
    if(kind==="rest") return { a:"var(--cool-1)", b:"var(--cool-2)", label:"Rest", labelColor:"var(--cool-2)" };
    if(kind==="prep") return { a:"var(--go)", b:"var(--go)", label:"Get Ready", labelColor:"var(--go)" };
    return { a:"var(--ember-1)", b:"var(--ember-2)", label:"Work", labelColor:"var(--ember-2)" };
  }

  function renderDetail(seg){
    if(seg.kind==="work"){
      var e=EX[seg.i];
      var cues="";
      for(var c=0;c<e.cues.length;c++) cues+="<li>"+e.cues[c]+"</li>";
      detail.innerHTML =
        '<div class="ex-name">'+e.name+'</div>'
        + '<div class="ex-sub">'+e.muscle+' <span class="dot">/</span> '+e.load+'</div>'
        + '<ul class="cues">'+cues+'</ul>'
        + '<div style="text-align:center"><span class="tempo"><span class="tlabel">Tempo</span> '+e.tempo+'</span></div>';
    } else if(seg.kind==="rest"){
      var nx=EX[seg.next];
      detail.innerHTML =
        '<div class="rest-view">'
        + '<div class="nextcard">'
        + '<div class="nlabel">Next Up</div>'
        + '<div class="nname">'+nx.name+'</div>'
        + '<div class="nsub">'+nx.muscle+' &nbsp;/&nbsp; '+nx.load+'</div>'
        + '<div class="ncue">'+nx.cues[0]+'</div>'
        + '</div></div>';
    } else { // prep
      var f=EX[0];
      detail.innerHTML =
        '<div class="rest-view">'
        + '<div class="nextcard">'
        + '<div class="nlabel">First Move</div>'
        + '<div class="nname">'+f.name+'</div>'
        + '<div class="nsub">'+f.muscle+' &nbsp;/&nbsp; '+f.load+'</div>'
        + '<div class="ncue">'+f.cues[0]+'</div>'
        + '</div></div>';
    }
  }

  // exercise number for counter (1-based within work segments)
  function currentExerciseNumber(seg){
    if(seg.kind==="work") return seg.i+1;
    if(seg.kind==="rest") return seg.i+1;   // during rest, show the move just finished
    return 1;
  }

  function loadSegment(newIdx, playCue){
    idx=newIdx;
    var seg=SEG[idx];
    remaining=seg.dur;
    lastWholeSec=Math.ceil(remaining);

    var col=phaseColors(seg.kind);
    ringProg.style.stroke = col.b;
    phaseLabel.textContent = col.label;
    phaseLabel.style.color = col.labelColor;

    cCur.textContent = String(currentExerciseNumber(seg)).padStart(2,"0");
    renderDetail(seg);
    updateRing();
    updateClock();

    if(playCue){
      if(seg.kind==="work") cueWork();
      else if(seg.kind==="rest") cueRest();
      else cuePrep();
    }
  }

  function updateRing(){
    var seg=SEG[idx];
    var frac = Math.max(0, Math.min(1, remaining/seg.dur));
    ringProg.style.strokeDashoffset = C * (1 - frac);
  }
  function updateClock(){
    timeNum.textContent = Math.ceil(remaining - 0.0001) < 0 ? 0 : Math.ceil(remaining - 0.0001);
  }

  function tick(ts){
    if(!running){ return; }
    if(paused){ lastTs=ts; rafId=requestAnimationFrame(tick); return; }
    if(!lastTs) lastTs=ts;
    var dt=(ts-lastTs)/1000;
    lastTs=ts;
    remaining -= dt;

    var whole=Math.ceil(remaining - 0.0001);
    if(whole!==lastWholeSec){
      lastWholeSec=whole;
      updateClock();
      // countdown ticks in final 3 seconds
      if(whole<=3 && whole>=1) cueTick();
    }
    updateRing();

    if(remaining<=0){
      advance();
    }
    rafId=requestAnimationFrame(tick);
  }

  function advance(){
    if(idx>=SEG.length-1){
      finish();
      return;
    }
    loadSegment(idx+1, true);
  }

  function finish(){
    running=false;
    if(rafId) cancelAnimationFrame(rafId);
    releaseWake();
    cueDone();
    sessionScreen.classList.add("hidden");
    doneScreen.classList.remove("hidden");
    doneScreen.style.display="flex";
  }

  // ---------- CONTROLS ----------
  function begin(){
    initAudio();
    if(actx && actx.state==="suspended") actx.resume();
    startScreen.classList.add("hidden");
    doneScreen.classList.add("hidden");
    doneScreen.style.display="none";
    sessionScreen.classList.remove("hidden");
    sessionScreen.style.display="flex";
    running=true; paused=false; lastTs=0;
    setPausedUI(false);
    loadSegment(0, true);
    requestWake();
    rafId=requestAnimationFrame(tick);
  }

  function setPausedUI(p){
    if(p){
      pauseText.textContent="Resume";
      pauseIcon.innerHTML='<path d="M8 5v14l11-7z"/>';
      pauseBtn.classList.add("paused-state");
    } else {
      pauseText.textContent="Pause";
      pauseIcon.innerHTML='<path d="M6 5h4v14H6zm8 0h4v14h-4z"/>';
      pauseBtn.classList.remove("paused-state");
    }
  }

  $("startBtn").addEventListener("click", begin);
  $("againBtn").addEventListener("click", begin);

  pauseBtn.addEventListener("click", function(){
    if(!running) return;
    paused=!paused;
    setPausedUI(paused);
    if(paused){ releaseWake(); }
    else { lastTs=0; requestWake(); }
  });

  $("skipBtn").addEventListener("click", function(){
    if(!running) return;
    if(idx>=SEG.length-1){ finish(); return; }
    loadSegment(idx+1, true);
  });

  $("prevBtn").addEventListener("click", function(){
    if(!running) return;
    // if more than 2s in, restart current; else go to previous segment
    var seg=SEG[idx];
    if(seg.dur - remaining > 2 || idx===0){
      loadSegment(idx, true);
    } else {
      loadSegment(idx-1, true);
    }
  });

  $("quitBtn").addEventListener("click", function(){
    running=false; paused=false;
    if(rafId) cancelAnimationFrame(rafId);
    releaseWake();
    setPausedUI(false);
    sessionScreen.classList.add("hidden");
    startScreen.classList.remove("hidden");
  });

  // keyboard: space to pause/resume
  document.addEventListener("keydown", function(ev){
    if(ev.code==="Space" && running){ ev.preventDefault(); pauseBtn.click(); }
  });

})();
</script>
</body>
</html>
